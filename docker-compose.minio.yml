services:
  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-mc:
    image: minio/mc:RELEASE.2025-01-20T14-49-07Z
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        until mc alias set local http://minio:9000 minioadmin minioadmin; do
          echo "Waiting for MinIO..."
          sleep 1
        done
        mc mb -p local/neural-analyst || true
        echo "MinIO bucket ready: neural-analyst"

  analyst-backend:
    environment:
      OBJECT_STORE_BACKEND: s3
      OBJECT_STORE_S3_BUCKET: neural-analyst
      OBJECT_STORE_S3_PREFIX: neural-analyst
      OBJECT_STORE_S3_ENDPOINT_URL: http://minio:9000
      OBJECT_STORE_S3_ACCESS_KEY_ID: minioadmin
      OBJECT_STORE_S3_SECRET_ACCESS_KEY: minioadmin
      OBJECT_STORE_S3_FORCE_PATH_STYLE: "true"

  analyst-worker:
    environment:
      OBJECT_STORE_BACKEND: s3
      OBJECT_STORE_S3_BUCKET: neural-analyst
      OBJECT_STORE_S3_PREFIX: neural-analyst
      OBJECT_STORE_S3_ENDPOINT_URL: http://minio:9000
      OBJECT_STORE_S3_ACCESS_KEY_ID: minioadmin
      OBJECT_STORE_S3_SECRET_ACCESS_KEY: minioadmin
      OBJECT_STORE_S3_FORCE_PATH_STYLE: "true"

volumes:
  minio_data:

