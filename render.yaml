services:
  - type: web
    name: ai-data-analyst-backend
    env: docker
    rootDir: ai-data-analyst/backend
    dockerfilePath: Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: DEPLOYMENT_MODE
        value: saas
      - key: AUTH_MODE
        value: jwt
      - key: DB_MIGRATE_ON_STARTUP
        value: "true"
      - key: DB_AUTO_CREATE_TABLES
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: ai-data-analyst-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_PRO
        sync: false
      - key: STRIPE_PRICE_ENTERPRISE
        sync: false
      - key: FRONTEND_URL
        sync: false

databases:
  - name: ai-data-analyst-db
    databaseName: ai_data_analyst
    plan: free